name: Docker Build and Push

on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
        description: Full image tags (newline-separated)
      annotations:
        required: false
        type: string
        description: OCI annotations (defaults to standard project metadata)
        default: |
          index:org.opencontainers.image.title=Mealie Recipe Translator
          index:org.opencontainers.image.description=Translates Mealie recipes using LLMs and converts imperial units to metric
          index:org.opencontainers.image.url=https://github.com/lipkau/mealie_translate
          index:org.opencontainers.image.source=https://github.com/lipkau/mealie_translate
          index:org.opencontainers.image.documentation=https://github.com/lipkau/mealie_translate#readme
          index:org.opencontainers.image.licenses=MIT
          index:org.opencontainers.image.vendor=Oliver Lipkau
      pr_number:
        required: false
        type: string
        default: ""
        description: PR number to comment on (empty to skip)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ inputs.tags }}
          annotations: ${{ inputs.annotations }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR with image tag
        if: ${{ inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}', 10);
            const imageTag = `${{ inputs.tags }}`.split('\n').map(s => s.trim()).filter(Boolean)[0];
            const shortSha = '${{ github.event.workflow_run.head_sha }}'.substring(0, 7);
            const marker = '<!-- mealie-pr-image -->';

            const body = [
              marker,
              '### Docker image for this PR',
              '',
              '```',
              `docker pull ${imageTag}`,
              '```',
              '',
              `Built from commit \`${shortSha}\`. This image is rebuilt on every push to this PR.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              console.log('Created new PR comment');
            }
