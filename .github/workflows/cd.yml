name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  gate:
    name: Determine Build Tags
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tags: ${{ steps.decide.outputs.tags }}
      pr_number: ${{ steps.find_pr.outputs.result }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ github.event.workflow_run.event != 'pull_request' }}
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Find git tag
        id: find_tag
        if: ${{ github.event.workflow_run.event != 'pull_request' }}
        run: |
          TAG=$(git tag --points-at ${{ github.event.workflow_run.head_sha }} | grep -E '^v[0-9]' | head -n1 || true)

          if [[ -n "$TAG" ]]; then
            DOCKER_TAG=$(echo "$TAG" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/^[-.]*//' | sed 's/[-._]*$//')

            if [[ -z "$DOCKER_TAG" ]]; then
              echo "Warning: Tag '$TAG' is invalid for Docker (sanitization resulted in empty string)"
              echo "tag=" >> $GITHUB_OUTPUT
            else
              echo "Original tag: $TAG → Docker tag: $DOCKER_TAG"
              echo "tag=$DOCKER_TAG" >> $GITHUB_OUTPUT
            fi
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

      - name: Check if commit is on main
        id: on_main
        if: ${{ steps.find_tag.outputs.tag != '' }}
        run: |
          git fetch origin main --quiet
          SHA="${{ github.event.workflow_run.head_sha }}"
          if git merge-base --is-ancestor "$SHA" origin/main 2>/dev/null; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            echo "Commit $SHA is not on main — skipping release builds"
            echo "result=false" >> $GITHUB_OUTPUT
          fi

      - name: Find associated pull request
        id: find_pr
        if: ${{ github.event.workflow_run.event == 'pull_request' }}
        uses: actions/github-script@v9
        with:
          script: |
            const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.payload.workflow_run.head_sha,
            });
            const open = pulls.data.filter(p => p.state === 'open');
            if (open.length > 0) {
              console.log(`Found open PR #${open[0].number}`);
              return open[0].number;
            }
            console.log('No open PR found for this commit');
            return '';
          result-encoding: string

      - name: Decide build tags
        id: decide
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          HAS_TAG="${{ steps.find_tag.outputs.tag }}"
          ON_MAIN="${{ steps.on_main.outputs.result }}"
          EVENT="${{ github.event.workflow_run.event }}"
          PR_NUM="${{ steps.find_pr.outputs.result }}"
          REPO="ghcr.io/${{ github.repository }}"

          IS_RELEASE=$([[ -n "$HAS_TAG" && "$ON_MAIN" == "true" ]] && echo true || echo false)

          TAGS=""

          if [[ "$HEAD_BRANCH" == "main" || "$IS_RELEASE" == "true" ]]; then
            TAGS="${REPO}:dev"
          fi

          if [[ "$IS_RELEASE" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${REPO}:${HAS_TAG}"
            TAGS="${TAGS}"$'\n'"${REPO}:latest"
          fi

          if [[ "$EVENT" == "pull_request" && -n "$PR_NUM" ]]; then
            TAGS="${REPO}:pr-${PR_NUM}"
          fi

          echo "Tags to build: $TAGS"

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    name: Build and Push
    needs: gate
    if: ${{ needs.gate.outputs.tags != '' }}
    uses: ./.github/workflows/_docker-build.yml
    secrets: inherit
    with:
      tags: ${{ needs.gate.outputs.tags }}
      pr_number: ${{ needs.gate.outputs.pr_number }}
