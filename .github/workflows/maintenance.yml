name: Maintenance

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dismiss_alerts:
        description: "Dismiss stale security alerts"
        required: false
        default: false
        type: boolean
      alert_age_days:
        description: "Dismiss alerts older than N days (default: 30)"
        required: false
        default: "30"
        type: string

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cleanup-old-images:
    name: Cleanup Old Ephemeral Images
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Delete dev images older than 7 days (keep recent ones for debugging)
      - name: Delete old dev images
        run: |
          echo "🧹 Starting scheduled cleanup of old ephemeral images..."

          # Extract repository name from full repository path
          REPO_NAME="${{ github.event.repository.name }}"
          echo "Repository: ${{ github.repository_owner }}/$REPO_NAME"

          # Check if any container packages exist for this organization
          echo "Checking if container packages exist..."
          PACKAGES_RESPONSE=$(gh api -H "Accept: application/vnd.github.v3+json" \
            "/orgs/${{ github.repository_owner }}/packages?package_type=container" 2>/dev/null || echo "[]")

          if [[ "$PACKAGES_RESPONSE" == "[]" ]] || [[ -z "$PACKAGES_RESPONSE" ]]; then
            echo "ℹ️  No container packages found for this organization yet"
            echo "This is normal if no Docker images have been published through CI/CD"
            exit 0
          fi

          # Filter for packages matching this repository name
          REPO_PACKAGES=$(echo "$PACKAGES_RESPONSE" | jq -r --arg repo "$REPO_NAME" '.[] | select(.name == $repo) | .name' || echo "")

          if [[ -z "$REPO_PACKAGES" ]]; then
            echo "ℹ️  No container packages found for repository '$REPO_NAME'"
            echo "This is normal if Docker images haven't been published for this repository yet"
            exit 0
          fi

          # Get all package versions (images) for this repository
          echo "Fetching package versions..."
          PACKAGES_JSON=$(gh api -H "Accept: application/vnd.github.v3+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/$REPO_NAME/versions?per_page=100" 2>/dev/null || echo "[]")

          if [[ "$PACKAGES_JSON" == "[]" ]]; then
            echo "ℹ️  No package versions found"
            exit 0
          fi

          # Filter for ephemeral images (dev and PR tags)
          PACKAGES=$(echo "$PACKAGES_JSON" | jq -c '.[] | select(.metadata.container.tags[]? | test("^(dev|pr-.*)$")) | {id: .id, tags: .metadata.container.tags, created: .created_at}')

          if [[ -z "$PACKAGES" ]]; then
            echo "ℹ️  No ephemeral images found"
            exit 0
          fi

          # Calculate cutoff date (7 days ago)
          CUTOFF_DATE=$(date -d '7 days ago' -u +%Y-%m-%dT%H:%M:%SZ)

          echo "Cutoff date: $CUTOFF_DATE"
          echo "Found ephemeral images:"
          echo "$PACKAGES" | jq -r '. | "ID: \(.id), Tags: \(.tags | join(", ")), Created: \(.created)"'

          # Delete images older than cutoff
          OLD_IMAGES=$(echo "$PACKAGES" | jq -r --arg cutoff "$CUTOFF_DATE" 'select(.created < $cutoff) | .id')

          if [[ -z "$OLD_IMAGES" ]]; then
            echo "✅ No old ephemeral images found to delete"
          else
            echo "🗑️  Deleting old ephemeral images:"
            DELETED_COUNT=0
            for IMAGE_ID in $OLD_IMAGES; do
              echo "Deleting image ID: $IMAGE_ID"
              if gh api --method DELETE -H "Accept: application/vnd.github.v3+json" \
                "/orgs/${{ github.repository_owner }}/packages/container/$REPO_NAME/versions/$IMAGE_ID" 2>/dev/null; then
                ((DELETED_COUNT++))
                echo "✅ Successfully deleted image ID: $IMAGE_ID"
              else
                echo "⚠️  Failed to delete image ID: $IMAGE_ID"
              fi
            done
            echo "✅ Cleanup completed - deleted $DELETED_COUNT images"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dismiss-stale-alerts:
    name: Dismiss Stale Security Alerts
    runs-on: ubuntu-latest
    # Only run when manually triggered with dismiss_alerts=true
    if: github.event_name == 'workflow_dispatch' && inputs.dismiss_alerts == true

    steps:
      - name: Dismiss stale Trivy alerts
        run: |
          echo "🔒 Dismissing stale security alerts..."

          AGE_DAYS="${{ inputs.alert_age_days }}"
          CUTOFF_DATE=$(date -d "${AGE_DAYS} days ago" -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dismissing alerts older than: $CUTOFF_DATE ($AGE_DAYS days)"

          # Get all open Trivy alerts
          echo "Fetching open Trivy alerts..."
          ALERTS=$(gh api repos/${{ github.repository }}/code-scanning/alerts \
            --paginate \
            --jq '.[] | select(.state=="open" and .tool.name=="Trivy") | {number: .number, created: .created_at, rule: .rule.id}')

          if [[ -z "$ALERTS" ]]; then
            echo "✅ No open Trivy alerts found"
            exit 0
          fi

          TOTAL=$(echo "$ALERTS" | jq -s 'length')
          echo "Found $TOTAL open Trivy alerts"

          # Filter for alerts older than cutoff
          OLD_ALERTS=$(echo "$ALERTS" | jq -rs --arg cutoff "$CUTOFF_DATE" \
            '.[] | select(.created < $cutoff) | .number')

          if [[ -z "$OLD_ALERTS" ]]; then
            echo "✅ No alerts older than $AGE_DAYS days found"
            exit 0
          fi

          OLD_COUNT=$(echo "$OLD_ALERTS" | wc -w)
          echo "Found $OLD_COUNT alerts older than $AGE_DAYS days"

          # Dismiss old alerts
          DISMISSED=0
          FAILED=0

          for ALERT_NUM in $OLD_ALERTS; do
            if gh api -X PATCH "repos/${{ github.repository }}/code-scanning/alerts/$ALERT_NUM" \
              -f state=dismissed \
              -f dismissed_reason="won't fix" \
              -f dismissed_comment="Auto-dismissed: Stale Trivy alert (base image CVE older than ${AGE_DAYS} days)" \
              > /dev/null 2>&1; then
              DISMISSED=$((DISMISSED + 1))
            else
              FAILED=$((FAILED + 1))
              echo "⚠️ Failed to dismiss alert #$ALERT_NUM"
            fi

            # Progress indicator every 50 alerts
            PROCESSED=$((DISMISSED + FAILED))
            if (( PROCESSED % 50 == 0 )); then
              echo "Progress: $PROCESSED/$OLD_COUNT alerts processed..."
            fi

            # Rate limit protection: pause briefly every 100 requests
            if (( PROCESSED % 100 == 0 )); then
              echo "⏳ Pausing to avoid rate limits..."
              sleep 2
            fi
          done

          echo ""
          echo "📊 Summary:"
          echo "  Total open Trivy alerts: $TOTAL"
          echo "  Alerts older than $AGE_DAYS days: $OLD_COUNT"
          echo "  Successfully dismissed: $DISMISSED"
          echo "  Failed to dismiss: $FAILED"
          echo ""
          echo "✅ Stale alert cleanup completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
